name: Update GitHub Activity

on:
  schedule:
    - cron: "0 */12 * * *"  # Runs every 12 hours
  workflow_dispatch:  # Allows manual triggering
  push:  # Run on commits to any branch
    branches:
      - main  # Replace with your default branch if it's different (e.g., master)
    paths-ignore:
      - '**.md'  # Prevents infinite loop by ignoring changes to markdown files

jobs:
  update-readme:
    name: Update README with Recent Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: Readme-Workflows/recent-activity@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
